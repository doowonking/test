<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AI 양치 수호대</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #121212; 
      font-family: 'Pretendard', sans-serif; 
      text-align: center;
    }
    
    #container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
    }
    video, canvas { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1); 
    }

    #status-box { 
      position: absolute; 
      top: 20px; 
      left: 5%; 
      width: 90%; 
      z-index: 10; 
      background: rgba(0,0,0,0.7); 
      padding: 15px 0; 
      border-radius: 20px; 
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #status { 
      font-size: 20px; 
      font-weight: bold; 
      color: #FFEB3B; 
      margin: 0;
    }

    #actionBtn { 
      position: absolute; 
      bottom: 50px; 
      left: 50%; 
      transform: translateX(-50%); 
      z-index: 10;
      background-color: #00BCD4; 
      color: white; 
      font-size: 24px; 
      font-weight: bold; 
      padding: 18px 45px; 
      border: none; 
      border-radius: 50px; 
      cursor: pointer; 
      box-shadow: 0 8px 20px rgba(0,188,212,0.5);
      transition: all 0.2s;
      white-space: nowrap;
    }
    #actionBtn:active { 
      transform: translateX(-50%) scale(0.95); 
      box-shadow: 0 4px 10px rgba(0,188,212,0.5);
    }
