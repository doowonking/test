<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>수동 버튼 카메라 테스트</title>
  <style>
    body { 
      text-align: center; 
      font-family: sans-serif; 
      margin: 0; 
      padding-top: 30px;
      background-color: #f0f0f0; 
    }
    #startBtn {
      background-color: #4CAF50;
      color: white;
      font-size: 22px;
      font-weight: bold;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      margin-bottom: 20px;
    }
    #startBtn:active {
      background-color: #45a049;
      transform: translateY(2px);
    }
    video { 
      width: 90%; 
      max-width: 400px; 
      height: 300px; 
      background: #222; 
      border-radius: 10px; 
      display: none; /* 처음에는 비디오 화면 숨김 */
      margin: 0 auto;
    }
    #status { 
      font-weight: bold; 
      font-size: 16px; 
      color: #333; 
      padding: 15px; 
    }
  </style>
</head>
<body>

  <button id="startBtn">📷 카메라 켜기 (여기를 누르세요)</button>
  
  <div id="status">버튼을 눌러 카메라 권한을 허용해 주세요.</div>
  
  <video id="video" autoplay playsinline muted></video>

  <script>
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');
    const video = document.getElementById('video');

    // 버튼을 클릭했을 때만 카메라 요청을 시작합니다.
    startBtn.addEventListener('click', function() {
      statusDiv.innerText = "카메라 권한을 요청 중입니다...";
      statusDiv.style.color = "blue";

      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
          .then(function(stream) {
            statusDiv.innerText = "카메라 연결 성공! 🎉";
            statusDiv.style.color = "green";
            
            // 버튼 숨기고 비디오 화면 보여주기
            startBtn.style.display = 'none';
            video.style.display = 'block';
            video.srcObject = stream;
          })
          .catch(function(err) {
            statusDiv.innerText = "❌ 카메라 에러: " + err.message;
            statusDiv.style.color = "red";
          });
      } else {
        statusDiv.innerText = "❌ 이 브라우저는 카메라 기능을 지원하지 않습니다.";
        statusDiv.style.color = "red";
      }
    });
  </script>

</body>
</html>
